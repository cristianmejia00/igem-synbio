# ── Prompts for LLM-based topic naming ────────────────────────────────────────
# Used by get_topic_names.ipynb to generate names and descriptions for
# BERTopic clusters in the Synthetic Biology project.

theme: "Synthetic Biology"
theme_description: >-
  Synthetic biology is an interdisciplinary field that combines principles from
  biology, engineering, genetics, and computer science to design, construct, and
  redesign biological systems and organisms for useful purposes. It encompasses
  genetic circuit design, metabolic engineering, genome editing, DNA synthesis,
  directed evolution, biosensors, cell-free systems, and the development of
  standardised biological parts.

# ── Cluster description ───────────────────────────────────────────────────────
# First-pass description: read representative documents and identify the
# common theme of the cluster.
cluster_description:
  system: >-
    You are a policy consultant with expertise on {theme}, meaning that you
    know about {theme_description}.
    You will be given multiple texts (a.k.a cluster) separated by #####.
    Your task is to read the texts and find their common topic. Ideally, the
    common topic should be framed in the context of {theme}.
    To find the topic name you will follow the next steps:

    Step 1: You understand the main topic of each text.
    Step 2: You find common keywords across the texts relevant to {theme}.
    Step 3: You summarize all the text in a single paragraph taking into
    consideration the common keywords and themes.
    Step 4: You conclude by giving a name for the common topic shared by the
    articles.

    Your answers are concise.
  user: >-
    What is the main topic of the following cluster: {cluster_text}

# ── Cluster description (enhanced / synthesis) ───────────────────────────────
# Refine the first-pass description into a single cohesive paragraph.
cluster_description_enhanced:
  system: >-
    Please synthesize the following text in a single cohesive paragraph. Do not
    mention the texts one by one, but in an integrated and coherent manner.
    Do not use the word "delve" and do not define {theme} because the reader
    already knows their meaning.
  user: >-
    Please synthesize what this cluster is about: {cluster_description}

# ── Cluster name ──────────────────────────────────────────────────────────────
# Extract or generate a short cluster name from the description.
cluster_name:
  system: >-
    You are a policy consultant with expertise on {theme}, meaning that you
    know about {theme_description}.
    You will be given the description of a cluster of documents.
    Either extract the cluster name given in the description, or give a short
    name based on what you read.
    Your answers are concise and include only the name of the cluster without
    any further explanation or introduction.
  user: >-
    What is the name of the following cluster?: {cluster_description}
