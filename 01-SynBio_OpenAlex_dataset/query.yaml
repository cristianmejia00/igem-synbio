# Synthetic Biology query for OpenAlex
# Adapted from Appendix A of:
#   Baaden, P., Bröring, S., Rennings, M., & Shapira, P. (2026).
#   Researcher positions and the emergence of interdisciplinary scientific
#   fields – The case of synthetic biology. Research Policy, 55(3), 105395.
#   https://doi.org/10.1016/j.respol.2025.105395
#
# Split into 7 parts due to API query-length limits.
# Each part is OR'd together conceptually — results are downloaded separately
# then merged downstream.

year_start: 1950
year_end: 2025

parts:
  - name: PART_1
    query: >
      ("synthetic biology" OR "synthetic biological" OR "synthetic biologists"
      OR "synthetic biologically" OR "synthetic biologic" OR "synthetic biologics"
      OR "synthetic biologist"
      OR "synthetic dna"
      OR "synthetic genome" OR "synthetic genomes" OR "synthetic genomics"
      OR "synthetic genomic" OR "synthetic genom"
      OR "synthetic oligonucleotides" OR "synthetic oligonucleotide"
      OR "synthetic nucleotide" OR "synthetic polynucleotide"
      OR "synthetic oligodeoxynucleotide" OR "synthetic oligoribonucleotide"
      OR "synthetic oligodeoxyribonucleotide" OR "synthetic dinucleotide"
      OR "synthetic deoxynucleotide" OR "synthetic polyribonucleotide"
      OR "synthetic deoxyoligonucleotide" OR "synthetic deoxyribonucleotide"
      OR "synthetic decanucleotide" OR "synthetic polydeoxynucleotide"
      OR "synthetic ribonucleotide" OR "synthetic dodecanucleotide"
      OR "synthetic liponucleotide" OR "synthetic oligodeoxinucleotide"
      OR "synthetic deoxydecanucleotide" OR "synthetic hexanucleotide"
      OR "synthetic octanucleotide" OR "synthetic polydeoxyribonucleotide"
      OR "synthetic octadeoxyribonucleotide" OR "synthetic ologonucleotide"
      OR "synthetic hexadecanucleotide" OR "synthetic deoxyoctanucleotide"
      OR "synthetic undecanucleotide" OR "synthetic pentadecanucleotide"
      OR "synthetic deoxypolynucleotide"
      OR "synthetic promoter"
      OR "synthetic gene clusters" OR "synthetic gene cluster")
      NOT ("photosynthetic" OR "photosynthesis" OR "photosynthetically"
      OR "photosynthesized" OR "photosynthesize" OR "photosynthesizing"
      OR "photosynthesising" OR "photosynthese" OR "photosynthesizers"
      OR "photosynthesise")

  - name: PART_2
    query: >
      ("synthetic mammalian gene" AND "mammalian cell")
      NOT ("photosynthetic" OR "photosynthesis" OR "photosynthetically"
      OR "photosynthesized" OR "photosynthesize" OR "photosynthesizing"
      OR "photosynthesising" OR "photosynthese" OR "photosynthesizers"
      OR "photosynthesise")

  - name: PART_3
    query: >
      ("synthetic genetic" OR "synthetic gene" OR "synthetic genes"
      OR "synthetic generation" OR "synthetic generated" OR "synthetic genetics"
      OR "synthetic generality" OR "synthetic generators" OR "synthetic generator"
      OR "synthetic general" OR "synthetic generalized" OR "synthetic generalization")
      NOT ("synthetic generation" OR "synthetic generated" OR "synthetic generators"
      OR "synthetic generator" OR "synthetic general" OR "synthetic generality"
      OR "synthetic generalized" OR "synthetic generalization" OR "synthetic generative"
      OR "synthetic generating" OR "synthetic generic" OR "synthetic generates"
      OR "synthetic generationmethod" OR "synthetic generics"
      OR "synthetic generalisations"
      OR "photosynthetic" OR "photosynthesis" OR "photosynthetically"
      OR "photosynthesized" OR "photosynthesize" OR "photosynthesizing"
      OR "photosynthesising" OR "photosynthese" OR "photosynthesizers"
      OR "photosynthesise")

  - name: PART_4
    query: >
      ("artificial genetic networks" OR "artificial gene networks"
      OR "artificial genetic network" OR "artificial gene network"
      OR "artificial genetic circuits" OR "artificial gene circuits"
      OR "artificial genetic circuitry" OR "artificial genetic circuit"
      OR "artificial gene circuit" OR "artificial gene circuitry")
      NOT ("generation" OR "generated" OR "general" OR "generally"
      OR "generates" OR "generating" OR "generalize" OR "generalized"
      OR "generic" OR "generate" OR "generators" OR "generalization"
      OR "genera" OR "generator" OR "generalizes" OR "generality"
      OR "generalised" OR "generalizable" OR "generalizability"
      OR "generalizing" OR "generational" OR "generalise"
      OR "generically" OR "generalisation" OR "generalist"
      OR "generous" OR "generative" OR "genert" OR "generosity"
      OR "generalises" OR "generalising" OR "generations"
      OR "generalisability" OR "generatrix" OR "generalisable"
      OR "generis" OR "genericity" OR "generasi" OR "gener"
      OR "generously" OR "generalizad" OR "generativity" OR "generar")

  - name: PART_5
    query: >
      ("artificial cell")
      NOT ("cellular telephone" OR "cellular telephones" OR "cell telephones"
      OR "cell telephone" OR "cell phones" OR "cell phone" OR "cellular phone"
      OR "cellular phones" OR "cellar phones" OR "cellar phone"
      OR "cell cultures" OR "cell culture" OR "cellular culture"
      OR "cellular cultures" OR "cells culture"
      OR "logic cells" OR "logic cell" OR "logic cellular"
      OR "fuel cell" OR "fuel cells" OR "fuel cellsfuel" OR "fuel cellular"
      OR "battery cell" OR "battery cells"
      OR "load cell" OR "load cells" OR "load cellular"
      OR "geo-synthetic cell"
      OR "memory cells" OR "memory cell" OR "memory cellular" OR "memory cellulose"
      OR "cellular network"
      OR "ram cells" OR "ram cell"
      OR "rom cell" OR "rom cells" OR "rom celles"
      OR "maximum cell" OR "maximum cellulase" OR "maximum cellulose"
      OR "maximum cellulolytic" OR "maximum cellular" OR "maximum cellularity"
      OR "electrochemical cell" OR "electrochemical cells" OR "electrochemical cellular"
      OR "solar cells" OR "solar cell" OR "solar cellssolar"
      OR "photosynthetic" OR "photosynthesis" OR "photosynthetically"
      OR "photosynthesized" OR "photosynthesize" OR "photosynthesizing"
      OR "photosynthesising" OR "photosynthese" OR "photosynthesizers"
      OR "photosynthesise")

  - name: PART_6
    query: >
      ("synthetic cell")
      NOT ("cellular telephone" OR "cellular telephones" OR "cell telephones"
      OR "cell telephone" OR "cell phones" OR "cell phone" OR "cellular phone"
      OR "cellular phones" OR "cellar phones" OR "cellar phone"
      OR "cell cultures" OR "cell culture" OR "cellular culture"
      OR "cellular cultures" OR "cells culture"
      OR "logic cells" OR "logic cell" OR "logic cellular"
      OR "fuel cell" OR "fuel cells" OR "fuel cellsfuel" OR "fuel cellular"
      OR "battery cell" OR "battery cells"
      OR "load cell" OR "load cells" OR "load cellular"
      OR "geo-synthetic cell"
      OR "memory cells" OR "memory cell" OR "memory cellular" OR "memory cellulose"
      OR "cellular network"
      OR "ram cells" OR "ram cell"
      OR "rom cell" OR "rom cells"
      OR "maximum cell" OR "maximum cellulase" OR "maximum cellulose"
      OR "maximum cellulolytic" OR "maximum cellular" OR "maximum cellularity"
      OR "electrochemical cell" OR "electrochemical cells" OR "electrochemical cellular"
      OR "solar cells" OR "solar cell" OR "solar cellssolar"
      OR "photosynthetic" OR "photosynthesis" OR "photosynthetically"
      OR "photosynthesized" OR "photosynthesize" OR "photosynthesizing"
      OR "photosynthesising" OR "photosynthese" OR "photosynthesizers"
      OR "photosynthesise")

  - name: PART_7
    query: >
      ("artificial nucleic acid" OR "artificial nucleic acids"
      OR "artificial oligonucleotide" OR "artificial oligonucleotides"
      OR "artificial nucleotide" OR "artificial dinucleotide"
      OR "artificial internucleotide" OR "artificial oligodeoxynucleotide"
      OR "artificial polyribonucleotide"
      OR "bio brick" OR "biobrick" OR "bio-brick")
